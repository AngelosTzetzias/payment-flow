services:
  postgres:
    image: postgres:16-alpine
    container_name: payment-flow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: payment
      POSTGRES_DB: payment_flow
    ports:
      - "5432:5432"
    volumes:
      - payment_flow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment -d payment_flow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  payment_flow_pgdata:
